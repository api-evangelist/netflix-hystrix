aid: netflix-hystrix
name: Netflix Hystrix
description: >-
  Netflix Hystrix is a latency and fault tolerance library designed to isolate
  points of access to remote systems, services, and third-party libraries, stop
  cascading failure, and enable resilience in complex distributed systems where
  failure is inevitable. Now in maintenance mode, with Resilience4j recommended
  as a replacement.
